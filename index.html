<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOP</title>

  <style>
    body {
      margin: 0;
      padding: 24px 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", system-ui, sans-serif;
      line-height: 1.6;
      background: #f5f5f7;
      color: #222;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      background: #ffffff;
      padding: 24px 28px 32px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    /* ナビ */
    nav {
      margin-bottom: 16px;
      font-size: 14px;

      /* ふわっと表示 */
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    .nav-btn {
      height: 60px;
      vertical-align: middle;
      transition: 0.2s;
    }

    .nav-btn:hover {
      transform: scale(1.05);
    }

    .divider {
      display: inline-block;
      vertical-align: middle;
      margin: 0 6px;
      color: #222;
      font-weight: bold;
    }

    nav a {
      text-decoration: none;
    }

    /* 赤枠ポジション用エリア */
    .hero {
      height: 180px;               /* ←ここで位置調整 */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* HOME */
    .h1-img {
      max-width: 250px;

      /* ふわっと表示 */
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease forwards;
      animation-delay: 0.3s;
    }

    /* アニメーション */
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .note {
      margin: 4px 0 16px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>

<body>

<div class="page">

  <!-- ナビ -->
  <nav>
    <img src="images/HOMEcredit.png" alt="HOME" class="nav-btn">
    <span class="divider">｜</span>

    <a href="creators.html">
      <img src="images/CREDITScredit.png" alt="CREDITS" class="nav-btn">
    </a>

    <span class="divider">｜</span>

    <a href="music.html">
      <img src="images/TRACKScredit.png" alt="TRACKS" class="nav-btn">
    </a>
  </nav>

  <hr>

  <!-- HOME（赤枠位置） -->
  <div class="hero">
    <img src="images/HOMEcredit.png" alt="HOME" class="h1-img">
  </div>

  <p>
    本一覧は、本アカウントの投稿動画や配信演出等において利用している<br>
    * BGM/SE/画像素材/動画素材などのクレジット情報 * をまとめた一覧です。
  </p>

  <p class="note">
    ※ 本一覧は「制作・配布している素材」ではなく、「利用している外部素材のクレジット管理」を目的としています。<br>
    ※ 本一覧には現在利用中の素材だけでなく、今後の利用を検討している素材も一部含まれています。
  </p>

</div>

</body>
</html>
