<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>クレジット</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 24px 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", system-ui, sans-serif;
      line-height: 1.6;
      background: #f5f5f7;
      color: #222;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      background: #ffffff;
      padding: 24px 28px 32px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    /* ナビ */
    nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    nav a {
      display: inline-flex;
    }

    .nav-btn {
      height: 60px;
      display: block;
      transition: 0.2s;
    }

    .nav-btn:hover {
      transform: scale(1.05);
    }

    .divider {
      font-weight: bold;
    }

    /* 今いるページ（見た目だけ） */
    .current {
      opacity: 0.5;
    }

    hr {
      margin: 16px 0;
      border: none;
      border-top: 1px solid #ddd;
    }

    /* タイトル */
    .hero {
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .title-img {
      max-width: 180px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 0.2s;
    }

    /* アニメ */
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      font-size: 18px;
      margin: 0 0 12px;
      border-left: 4px solid #333;
      padding-left: 8px;
    }

    .credit-item {
      margin: 6px 0 0;
    }

    .credit-item a {
      color: #145bb5;
      text-decoration: none;
      font-size: 14px;
    }

    .credit-item a:hover {
      text-decoration: underline;
    }

    .credit-divider {
      margin: 6px 0 10px;
      font-size: 12px;
      color: #999;
    }

    .updated {
      font-size: 12px;
      color: #666;
      margin-top: 32px;
      text-align: right;
    }
  </style>
</head>

<body>

<div class="page">

  <!-- ナビ（全部クリック可能） -->
  <nav>
    <a href="index.html">
      <img src="images/HOMEcredit.png" class="nav-btn">
    </a>

    <span class="divider">｜</span>

    <a href="creators.html">
      <img src="images/CREDITScredit.png" class="nav-btn current">
    </a>

    <span class="divider">｜</span>

    <a href="music.html">
      <img src="images/TRACKScredit.png" class="nav-btn">
    </a>
  </nav>

  <hr>

  <!-- 中央タイトル（ここが重要） -->
  <div class="hero">
    <img src="images/CREDITScredit.png" class="title-img">
  </div>

  <div class="credit-list">

    <h2>使用サイト・クリエイター様</h2>

    <p class="credit-item">
      ⋄ NoCopyrightSounds (NCS)<br>
      <a href="https://ncs.io/" target="_blank">https://ncs.io/</a>
    </p>
    <p class="credit-divider">-------------------------</p>

    <p class="credit-item">
      ⋄ DOVA-SYNDROME<br>
      <a href="https://dova-s.jp/" target="_blank">https://dova-s.jp/</a>
    </p>
    <p class="credit-divider">-------------------------</p>

    <p class="credit-item">
      ⋄ 効果音ラボ<br>
      <a href="https://soundeffect-lab.info/" target="_blank">https://soundeffect-lab.info/</a>
    </p>
    <p class="credit-divider">-------------------------</p>

    <p class="credit-item">
      ⋄ Pixabay<br>
      <a href="https://pixabay.com/ja/" target="_blank">https://pixabay.com/ja/</a>
    </p>

  </div>

  <p class="updated">最終更新：2026年 4月</p>

</div>

</body>
</html>
